name: Deploy Static Site

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application for static export
        run: npm run build
        continue-on-error: false
        env:
          NODE_ENV: production
          NEXT_OUTPUT: export
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASEPATH: /VirtualDiagnosticSimulator.github.io
          DEMO_MODE: "true"
          NEXT_PUBLIC_STATIC_DEMO: "true"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # Deploys to gh-pages branch root
          # After this runs, configure GitHub Pages in Settings > Pages to use gh-pages branch

